<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貪食DORO</title>
<style>
  :root {
    --bg:        #12121e;
    --surface:   #1c1c2e;
    --hud:       #0c0c18;
    --border:    #3c3c64;
    --grid:      #1a1a2e;
    --snake-h:   #50dc8c;
    --snake-b:   #32b464;
    --food:      #ff5050;
    --food-glow: rgba(255,80,80,0.35);
    --text:      #dcdcf0;
    --muted:     #9090b8;
    --accent:    #64b4ff;
    --dead:      #ff3c3c;
    --overlay:   rgba(0,0,0,0.72);
    --cell:      20px;
    --cols:      25;
    --rows:      22;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', 'PingFang TC', 'Noto Sans TC', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 16px;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Wrapper ── */
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 560px;
  }

  /* ── HUD ── */
  .hud {
    width: 100%;
    background: var(--hud);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .hud-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.04em;
  }
  .hud-stats {
    display: flex;
    gap: 20px;
  }
  .stat { text-align: center; }
  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .stat-val {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
    min-width: 36px;
    display: block;
    text-align: center;
  }
  #hi-val { color: var(--accent); }

  /* ── Canvas wrapper ── */
  .canvas-wrap {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    /* size derived from CSS vars at runtime via JS */
  }

  canvas {
    display: block;
    background: var(--bg);
  }

  /* ── Overlay screens ── */
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px;
    background: var(--overlay);
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
    border-radius: 9px;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }

  .ov-title {
    font-size: 32px;
    font-weight: 700;
  }
  .ov-score {
    font-size: 15px;
    color: var(--muted);
  }

  .btn {
    margin-top: 8px;
    padding: 9px 28px;
    background: transparent;
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    color: var(--accent);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, transform .1s;
    letter-spacing: 0.04em;
  }
  .btn:hover  { background: rgba(100,180,255,.12); }
  .btn:active { transform: scale(0.96); }

  /* ── Mobile d-pad ── */
  .dpad {
    display: none;
    grid-template-columns: repeat(3, 52px);
    grid-template-rows:    repeat(2, 52px);
    gap: 6px;
  }
  @media (pointer: coarse), (max-width: 600px) {
    .dpad { display: grid; }
  }
  .dpad-btn {
    width: 52px; height: 52px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .1s, transform .1s;
    -webkit-tap-highlight-color: transparent;
  }
  .dpad-btn:active { background: var(--border); transform: scale(0.92); }H;
  const TICK  = 120; // ms per step (lower = faster)

// Scale canvas for retina
const canvas = document.getElementById('c');
const wrap   = document.getElementById('canvas-wrap');
const dpr    = window.devicePixelRatio || 1;
canvas.width  = W * dpr;
canvas.height = H * dpr;
canvas.style.width  = W + 'px';
canvas.style.height = H + 'px';
wrap.style.width  = W + 'px';
wrap.style.height = H + 'px';

const ctx = canvas.getContext('2d');
ctx.scale(dpr, dpr);

// ════════════════════════════════════════════════
//  CSS var helpers
// ════════════════════════════════════════════════
const cs = getComputedStyle(document.documentElement);
const v  = k => cs.getPropertyValue(k).trim();

// ════════════════════════════════════════════════
//  State
// ════════════════════════════════════════════════
const DIR = { UP:[0,-1], DOWN:[0,1], LEFT:[-1,0], RIGHT:[1,0] };

let snake, dir, nextDir, food, score, highScore, alive, paused;
let frame = 0, lastTick = 0, animId = null;

function initState() {
  const cx = Math.floor(COLS / 2);
  const cy = Math.floor(ROWS / 2);
  snake   = [[cx,cy],[cx-1,cy],[cx-2,cy]];
  dir     = DIR.RIGHT;
  nextDir = DIR.RIGHT;
  food    = spawnFood();
  score   = 0;
  alive   = true;
  paused  = false;
  frame   = 0;
  updateHUD();
}

function spawnFood() {
  const flat = new Set(snake.map(([x,y]) => y*COLS+x));
  let pos;
  do {
    const x = Math.floor(Math.random() * COLS);
    const y = Math.floor(Math.random() * ROWS);
    pos = [x, y];
  } while (flat.has(pos[1]*COLS+pos[0]));
  return pos;
}

// ════════════════════════════════════════════════
//  Game logic
// ════════════════════════════════════════════════
function step() {
  if (!alive || paused) return;
  dir = nextDir;
  const [hx, hy] = snake[0];
  const [dx, dy] = dir;
  const nx = hx + dx, ny = hy + dy;

  // Wall collision
  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) { die(); return; }
  // Self collision
  if (snake.some(([x,y]) => x===nx && y===ny)) { die(); return; }

  snake.unshift([nx, ny]);

  if (nx === food[0] && ny === food[1]) {
    score += 10;
    if (score > highScore) highScore = score;
    food = spawnFood();
  } else {
    snake.pop();
  }
  updateHUD();
}

function die() {
  alive = false;
  document.getElementById('dead-score').textContent =
    `得分 ${score}　最高 ${highScore}`;
  document.getElementById('ov-dead').classList.add('show');
}

// ════════════════════════════════════════════════
//  HUD update
// ════════════════════════════════════════════════
function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('hi-val').textContent    = highScore;
  document.getElementById('len-val').textContent   = snake.length;
}

// ════════════════════════════════════════════════
//  Drawing
// ════════════════════════════════════════════════
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}
function lerpColor(a, b, t) {
  return a.map((c,i) => Math.round(c + (b[i]-c)*t));
}

const COL_HEAD = hexToRgb('#50dc8c');
const COL_TAIL = hexToRgb('#1e7840');
const COL_DEAD_H = hexToRgb('#ff5050');
const COL_DEAD_T = hexToRgb('#7a1e1e');

function drawGrid() {
  ctx.strokeStyle = v('--grid');
  ctx.lineWidth   = 0.5;
  for (let x=0; x<=COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x*CELL, 0);
    ctx.lineTo(x*CELL, H);
    ctx.stroke();
  }
  for (let y=0; y<=ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y*CELL);
    ctx.lineTo(W, y*CELL);
    ctx.stroke();
  }
}

function drawFood() {
  const [fx, fy] = food;
  const cx = fx*CELL + CELL/2;
  const cy = fy*CELL + CELL/2;
  const pulse = Math.abs(Math.sin(frame * 0.08));
  const r = CELL*0.34 + pulse*2.5;

  // Glow
  const grd = ctx.createRadialGradient(cx,cy,0, cx,cy,r+8);
  grd.addColorStop(0, 'rgba(255,80,80,0.55)');
  grd.addColorStop(1, 'rgba(255,80,80,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, r+8, 0, Math.PI*2);
  ctx.fillStyle = grd;
  ctx.fill();

  // Apple body
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = '#ff5050';
  ctx.fill();

  // Shine
  ctx.beginPath();
  ctx.arc(cx - r*0.28, cy - r*0.28, r*0.28, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.30)';
  ctx.fill();
}

function drawSnake() {
  // Get references to the images
  const headImg = document.getElementById('snake-head-img');
  const bodyImg = document.getElementById('snake-body-img');

  snake.forEach(([x,y], i) => {
    const rx  = x*CELL;
    const ry  = y*CELL;

    let imgToDraw;
    if (i === 0) { // Head of the snake
      imgToDraw = headImg;
    } else { // Body segments
      imgToDraw = bodyImg;
    }

    if (imgToDraw && imgToDraw.complete) {
      ctx.drawImage(imgToDraw, rx, ry, CELL, CELL);
    } else {
      // Fallback to drawing a colored square if image is not loaded or missing
      ctx.fillStyle = i === 0 ? '#50dc8c' : '#32b464'; // Original head/body colors
      ctx.fillRect(rx, ry, CELL, CELL);
    }
  });

  // Eyes on head (adapted for image-based drawing)
  if (alive && snake.length > 0) {
    const [hx, hy] = snake[0];
    const [dx, dy] = dir;
    const cx = hx*CELL + CELL/2;
    const cy = hy*CELL + CELL/2;
    const eyeOffset = 4;
    const eyes = [
      [cx + dy*eyeOffset, cy + dx*eyeOffset],
      [cx - dy*eyeOffset, cy - dx*eyeOffset],
    ];
    eyes.forEach(([ex, ey]) => {
      ctx.beginPath();
      ctx.arc(ex, ey, 3, 0, Math.PI*2);
      ctx.fillStyle = '#f0f0ff';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex + dx*1.2, ey + dy*1.2, 1.8, 0, Math.PI*2);
      ctx.fillStyle = '#101020';
      ctx.fill();
    });
  }
}

// Polyfill roundRect for older browsers
function roundRect(ctx, x, y, w, h, r) {
  if (ctx.roundRect) {
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
  } else {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.arcTo(x+w, y, x+w, y+r, r);
    ctx.lineTo(x+w, y+h-r);
    ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
    ctx.lineTo(x+r, y+h);
    ctx.arcTo(x, y+h, x, y+h-r, r);
    ctx.lineTo(x, y+r);
    ctx.arcTo(x, y, x+r, y, r);
    ctx.closePath();
  }
}

function render(ts) {
  frame++;

  // Logic tick
  if (ts - lastTick >= TICK) {
    step();
    lastTick = ts;
  }

  // Clear
  ctx.fillStyle = v('--bg');
  ctx.fillRect(0, 0, W, H);

  drawGrid();
  drawFood();
  drawSnake();

  animId = requestAnimationFrame(render);
}

// ════════════════════════════════════════════════
//  Input
// ════════════════════════════════════════════════
const KEY_MAP = {
  ArrowUp:'UP', ArrowDown:'DOWN', ArrowLeft:'LEFT', ArrowRight:'RIGHT',
  w:'UP', s:'DOWN', a:'LEFT', d:'RIGHT',
  W:'UP', S:'DOWN', A:'LEFT', D:'RIGHT',
};

document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') { restart(); return; }
  if (e.key === 'p' || e.key === 'P') { togglePause(); return; }
  const name = KEY_MAP[e.key];
  if (!name) return;
  e.preventDefault();
  changeDir(name);
});

document.querySelectorAll('.dpad-btn').forEach(btn => {
  btn.addEventListener('click', () => changeDir(btn.dataset.dir));
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    changeDir(btn.dataset.dir);
  }, { passive: false });
});

function changeDir(name) {
  const d = DIR[name];
  if (!d) return;
  const opp = [-dir[0], -dir[1]];
  if (d[0] === opp[0] && d[1] === opp[1]) return;
  nextDir = d;
}

// Touch swipe
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  touchStart = null;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  if (Math.abs(dx) > Math.abs(dy))
    changeDir(dx > 0 ? 'RIGHT' : 'LEFT');
  else
    changeDir(dy > 0 ? 'DOWN' : 'UP');
}, { passive: true });

// ════════════════════════════════════════════════
//  Flow control
// ════════════════════════════════════════════════
highScore = parseInt(localStorage.getItem('snake_hi') || '0', 10);

function startGame() {
  document.getElementById('ov-start').classList.remove('show');
  document.getElementById('ov-dead').classList.remove('show');
  initState();
  lastTick = performance.now();
  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(render);
}

function restart() {
  localStorage.setItem('snake_hi', highScore);
  document.getElementById('ov-dead').classList.remove('show');
  initState();
  lastTick = performance.now();
}

function togglePause() {
  if (!alive) return;
  paused = !paused;
  if (!paused) lastTick = performance.now();
}

document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-restart').addEventListener('click', restart);

// Initial HUD
highScore = parseInt(localStorage.getItem('snake_hi') || '0', 10);
document.getElementById('hi-val').textContent = highScore;

// Draw idle frame
ctx.fillStyle = v('--bg');
ctx.fillRect(0, 0, W, H);
drawGrid();

// Prevent scroll on arrow keys
window.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))
    e.preventDefault();
}, { passive: false });
</script>
</body>

    <img id="snake-body-img" src="data:image/png;base64,{snake_body_base64}" style="display:none;"/>
