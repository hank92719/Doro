<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #ff9797;
            color: #333;
        }
        h1 {
            color: #0056b3;
        }
        p {
            line-height: 1.6;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin-top: 20px;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #0056b3;
        }
        #music-toggle-img {
            cursor: pointer;
            width: 40px; /* Adjust size as needed */
            height: 40px; /* Adjust size as needed */
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <audio id="background-music" loop autoplay>
        <source src="hajimi.mp3" type="audio/mpeg">
        Your browser does not not support the audio element.
    </audio>
    <img id="music-toggle-img" src="bgm_on.png" alt="Toggle Music"/>

    <h1>你是一個一個doropling!</h1>
    <p> 壓力</p>
    <p>max餒</p>
    <img src="IMG_6432.png" alt="My Local Image">
    <a href="https://youtu.be/dQw4w9WgXcQ?si=5PV5E7Ryg8gBxL4s" class="button" target="_blank">吃掉他！！！！</a>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const music = document.getElementById('background-music');
            const toggleImage = document.getElementById('music-toggle-img');
            const speakerOnSrc = 'bgm_on.png'; // Make sure this path is correct
            const speakerOffSrc = 'bgm_off.png'; // Make sure this path is correct
            let isPlaying = true; // Assume autoplay works initially

            toggleImage.addEventListener('click', function() {
                if (isPlaying) {
                    music.pause();
                    toggleImage.src = speakerOffSrc;
                } else {
                    music.play();
                    toggleImage.src = speakerOnSrc;
                }
                isPlaying = !isPlaying;
            });

            // Attempt to play music, handle if autoplay is blocked by browser
            music.play().catch(error => {
                console.log("Autoplay was prevented by the browser. User needs to interact to play music.");
                isPlaying = false;
                toggleImage.src = speakerOffSrc; // Set to speaker off if autoplay failed
            });
        });
    </script>
</body>
</html>
