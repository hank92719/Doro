
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>doropling_eating👶</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700&family=Noto+Sans+TC:wght@400;700&family=Permanent+Marker&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@400;700&display=swap" rel="stylesheet"> 
    <style>
        body {
            font-family: 'Josefin Sans', sans-serif; 
            margin: 20px;
            background-color: #fffcec;
            color: #333;
            background-image: url('background.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center center;
        }
        h1 {
            font-family: 'Permanent Marker', 'Chiron GoRound TC', sans-serif; 
            color: #0056b3;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3); 
        }
        p {
            font-family: 'Chiron GoRound TC', sans-serif; 
            line-height: 1.6;
            font-size: 18px;
            font-weight: 700;
        }
        img {
            max-width: 200px;
            height: auto;
            display: block;
            margin-top: 20px;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #0056b3;
        }
        .menu-button {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 20px;
            cursor: pointer;  
            z-index: 1000; 
            transition: background-color 0.3s;
        }
        .menu-button:hover {
             background-color: #0056b3;
        }
        .dropdown-content {
            position: fixed;
            top: 70px; 
            right: 20px;
            width: 200px;
            background-color: white;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.15);   
            border-radius: 5px;
            overflow: hidden;
            z-index: 999;
            max-height: 0;
            transition: max-height 0.4s ease-in-out;
        }
        .dropdown-content a {
            display: block;
            color: #333;
            padding: 12px 16px;
            text-decoration: none;
            font-family: 'Chiron GoRound TC', sans-serif;
            border-bottom: 1px solid #eee;
         }
        .dropdown-content a:hover {
            background-color: #fffcec; /* 呼應您的網頁背景色 */
            color: #007bff;
         }

       /* 4. 當選單被激活時的外觀（由 JS 控制切換） */
        .dropdown-content.show {
            max-height: 300px; 
         }
        #music-toggle-img {
            cursor: pointer;
            width:  40px; 
            height: 40px;
            margin-bottom: 10px;
        }
        
    </style>
</head>
<body>
    <audio id="background-music" loop autoplay>
        <source src="hajimi.mp3" type="audio/mpeg">
        Your browser does not not support the audio element.
    </audio>
    
    <div id="menu-btn" class="menu-button">☰</div>
    <div id="dropdown-menu" class="dropdown-content">
        <a href="#section1">🍊 認識 Doro 包</a>
        <a href="#section2">👨‍🍳 製作祕聞</a>
        <a href="#section3">🎵 哈基米音樂更換</a>
    </div>

    <img id="music-toggle-img" src="bgm_on.png" alt="Toggle Music"/>

    <h1>你是一個一個doropling!</h1>
    <p>🍊上海手工doropling等你來享用🍊</p>
    <img src="IMG_6432.png" alt="My Local Image">
    <a href="snake.html" class="button" target="_blank">吃掉他！！！！</a>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const music = document.getElementById('background-music');
            const toggleImage = document.getElementById('music-toggle-img');
            const speakerOnSrc = 'bgm_on.png'; 
            const speakerOffSrc = 'bgm_off.png'; 
            let isPlaying = true; 

            toggleImage.addEventListener('click', function() {
                if (isPlaying) {
                    music.pause();
                    toggleImage.src = speakerOffSrc;
                } else {
                    music.play();
                    toggleImage.src = speakerOnSrc;
                }
                isPlaying = !isPlaying;
            });

            music.play().catch(error => {
                console.log("Autoplay was prevented by the browser. User needs to interact to play music.");
                isPlaying = false;
                toggleImage.src = speakerOffSrc;
            });
        
           const menuBtn = document.getElementById('menu-btn');
           const dropdownMenu = document.getElementById('dropdown-menu');
           menuBtn.addEventListener('click', function(e) {
               dropdownMenu.classList.toggle('show');
    
    
               if (dropdownMenu.classList.contains('show')) {
                   menuBtn.textContent = '✕';
               } else {
                   menuBtn.textContent = '☰';
               }
                e.stopPropagation();
           });
           document.addEventListener('click', function() {
               if (dropdownMenu.classList.contains('show')) {
                   dropdownMenu.classList.remove('show');
                   menuBtn.textContent = '☰';
               }
           });
        });
    </script>
</body>
</html>
